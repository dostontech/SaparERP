# Uzbekistan ERPNext stack
# Builds a custom image with erpnext + hrms, then creates site and loads UZ fixtures.
#
# First run (build + start):
#   docker compose -f compose-uz.yml build
#   docker compose -f compose-uz.yml up
#
# Subsequent runs (stack already initialized):
#   docker compose -f compose-uz.yml up
#
# Access: http://localhost:8080   admin / admin
# To reset everything: docker compose -f compose-uz.yml down -v

x-image: &image
  image: erpnext-uz-fixed:latest
  build:
    context: .
    dockerfile: Dockerfile.uz

x-depends-on-setup: &depends_on_setup
  depends_on:
    create-and-setup:
      condition: service_completed_successfully

services:

  # ── infrastructure ──────────────────────────────────────────────────────────

  db:
    image: mariadb:11.8
    networks: [frappe_network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:6.2-alpine
    networks: [frappe_network]
    restart: unless-stopped

  redis-queue:
    image: redis:6.2-alpine
    networks: [frappe_network]
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  # ── one-shot init services ──────────────────────────────────────────────────

  configurator:
    <<: *image
    networks: [frappe_network]
    restart: "no"
    entrypoint: [bash, -c]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  create-and-setup:
    <<: *image
    networks: [frappe_network]
    restart: "no"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./setup_uz.py:/home/frappe/setup_uz.py:ro
      - ./setup_uz_lang.py:/home/frappe/setup_uz_lang.py:ro
      - ./setup_demo_data.py:/home/frappe/setup_demo_data.py:ro
      - ./sapar_lang_switch.js:/home/frappe/sapar_lang_switch.js:ro
    entrypoint: [bash, -c]
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]]; do
          echo "Waiting for configurator..."; sleep 4;
          if (( `date +%s`-start > 120 )); then echo "Timeout"; exit 1; fi;
        done;
        if [ -f sites/frontend/site_config.json ]; then
          echo "Site already exists — skipping creation";
        else
          echo "==> Creating site with erpnext + hrms...";
          bench new-site --mariadb-user-host-login-scope='%' --admin-password=admin --db-root-username=root --db-root-password=admin --install-app erpnext --install-app hrms --set-default frontend;
        fi;
        if ! bench --site frontend list-apps 2>/dev/null | grep -q hrms; then
          echo "==> Installing HRMS on existing site (this takes a few minutes)...";
          bench --site frontend install-app hrms;
        fi;
        echo "==> Running Uzbekistan setup...";
        /home/frappe/frappe-bench/env/bin/python /home/frappe/setup_uz.py &&
        echo "==> Running Sapar branding + Uzbek language setup...";
        /home/frappe/frappe-bench/env/bin/python /home/frappe/setup_uz_lang.py &&
        echo "==> Importing Russian translations...";
        bench --site frontend import-translations ru apps/frappe/frappe/locale/ru.po &&
        bench --site frontend import-translations ru apps/erpnext/erpnext/locale/ru.po &&
        bench --site frontend import-translations ru apps/hrms/hrms/locale/ru.po || true;
        echo "==> Deploying language switcher JS to sites volume...";
        mkdir -p sites/assets/frappe/js &&
        cp apps/frappe/frappe/public/js/sapar_lang_switch.js sites/assets/frappe/js/sapar_lang_switch.js;
        echo "==> Setup complete.";
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── application services ────────────────────────────────────────────────────

  backend:
    <<: [*image, *depends_on_setup]
    networks: [frappe_network]
    restart: unless-stopped
    environment:
      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "4"
      GUNICORN_TIMEOUT: "120"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  websocket:
    <<: [*image, *depends_on_setup]
    networks: [frappe_network]
    restart: unless-stopped
    command: [node, /home/frappe/frappe-bench/apps/frappe/socketio.js]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  frontend:
    <<: [*image, *depends_on_setup]
    networks: [frappe_network]
    restart: unless-stopped
    command: [nginx-entrypoint.sh]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: frontend
      UPSTREAM_REAL_IP_ADDRESS: "127.0.0.1"
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - websocket

  queue-short:
    <<: [*image, *depends_on_setup]
    networks: [frappe_network]
    restart: unless-stopped
    command: [bench, worker, --queue, "short,default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  queue-long:
    <<: [*image, *depends_on_setup]
    networks: [frappe_network]
    restart: unless-stopped
    command: [bench, worker, --queue, "long,default,short"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  scheduler:
    <<: [*image, *depends_on_setup]
    networks: [frappe_network]
    restart: unless-stopped
    command: [bench, schedule]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge

secrets:
  apps_json:
    file: ./apps-uz.json
