name: Build & Push SaparERP Image

on:
  push:
    branches: [main]
    paths:
      - "apps-uz.json"
      - "Dockerfile.uz"
      - "sapar_lang_switch.js"
      - "sapar_translate.html"
      - "sapar_translate_page.*"
      - "setup_uz*.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/dostontech/saparerp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Encode apps-uz.json
        id: b64
        run: echo "value=$(base64 -w 0 apps-uz.json)" >> $GITHUB_OUTPUT

      # Step 1 — Build base image: frappe + erpnext + hrms (~40 min, cached after)
      - name: Build base image erpnext-uz
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/layered/Containerfile
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            APPS_JSON_BASE64=${{ steps.b64.outputs.value }}
          outputs: type=docker,dest=/tmp/erpnext-uz.tar
          tags: erpnext-uz:latest
          cache-from: type=gha,scope=erpnext-uz
          cache-to: type=gha,scope=erpnext-uz,mode=max

      - name: Load base image
        run: docker load --input /tmp/erpnext-uz.tar

      # Step 2 — Apply SaparERP branding + UZ customizations
      - name: Build & push SaparERP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.uz
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:v16
          cache-from: type=gha,scope=saparerp
          cache-to: type=gha,scope=saparerp,mode=max
          load: false

      - name: Summary
        run: |
          echo "### Image pushed successfully" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE }}:v16" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Use this in Railway: SAPAR_IMAGE=${{ env.IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
