name: Build & Push SaparERP Image

on:
  push:
    branches: [main]
    paths:
      - "apps-uz.json"
      - "Dockerfile.uz"
      - "sapar_lang_switch.js"
      - "sapar_translate.html"
      - "sapar_translate_page.*"
      - "setup_uz*.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/dostontech/saparerp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 1 — Build base image: frappe + erpnext + hrms (~40 min, cached after)
      # apps-uz.json is passed as a BuildKit secret (matches --mount=type=secret,id=apps_json in Containerfile)
      - name: Build base image erpnext-uz
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/layered/Containerfile
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
          secret-files: |
            apps_json=apps-uz.json
          outputs: type=docker,dest=/tmp/erpnext-uz.tar
          tags: erpnext-uz:latest
          cache-from: type=gha,scope=erpnext-uz-v2
          cache-to: type=gha,scope=erpnext-uz-v2,mode=max

      - name: Load base image into local daemon
        run: docker load --input /tmp/erpnext-uz.tar

      # Step 2 — Apply SaparERP branding + UZ customizations
      # --builder default uses the docker driver (not docker-container) so it
      # can see the locally loaded base image from the step above
      - name: Build & push SaparERP image
        run: |
          docker buildx build \
            --builder default \
            --file Dockerfile.uz \
            --push \
            --tag ${{ env.IMAGE }}:latest \
            --tag ${{ env.IMAGE }}:v16 \
            .

      - name: Summary
        run: |
          echo "### Image pushed successfully" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE }}:v16" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Use this in Railway: SAPAR_IMAGE=${{ env.IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
